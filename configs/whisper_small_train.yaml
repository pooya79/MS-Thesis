model:
  name: openai/whisper-small
  language: Persian
  task: transcribe

data:
  root_dir: data
  datasets:
    - cv-corpus-25.0
    - data/FarsSpon_train_dev
    - data/fleurs-normalized
  sample_rate: 16000

run:
  output_dir: models/asr/whisper-small/runs
  name: whisper-small-fa
  resume: auto

training:
  seed: 1337
  num_train_epochs: 1
  learning_rate: 0.00001
  warmup_steps: 0
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  eval_steps: 50000
  save_steps: 500
  logging_steps: 25
  save_total_limit: 3
  num_workers: 4
  device: auto
  mixed_precision: auto
  load_best_model_at_end: false
  generation_max_length: 225
