# Single config driving the 3-stage enhancement+fusion curriculum (D8/D10).
# Consumes a degraded dataset produced by ml.speech_data.generate_degraded_dataset.
run_dir: artifacts/speech_enhancement/fusion/run_001

# Fine-tuned Persian Whisper-small checkpoint (Phase 1); used to init Stages 1-2.
base_asr_checkpoint: models/asr/whisper-small/runs/best

dataset_dir: data/cv-corpus-25.0-degraded
train_split: train
valid_split: dev
clean_target: bandwidth_aligned   # bandwidth_aligned | full_band (D5)
model_name: openai/whisper-small

mixed_precision: auto             # auto | true | false
device: auto                      # auto | cuda | cpu
seed: 1337
resume_from_stage: null           # null | 0 | 1 | 2 (or warmup | fusion | joint)

enhancer:
  type: residual_unet
  base_channels: 32
  depth: 3

stages:
  warmup:        # Stage 0 — enhancer E only, L_enh
    max_steps: 5000
    batch_size: 8
    segment_seconds: 4.0
    lr_enhancer: 0.0002
    lambda: 1.0
    num_workers: 4
    log_every: 50
    eval_every: 500
    save_every: 1000
  fusion:        # Stage 1 — E + fusion, Whisper frozen (pending ml/fusion/model.py)
    max_steps: 20000
    batch_size: 8
    lr_frontend: 0.0002
    lambda: 0.3
  joint:         # Stage 2 — E + fusion + Whisper, end-to-end (pending ml/fusion/model.py)
    max_steps: 40000
    batch_size: 4
    lr_frontend: 0.0001
    lr_whisper: 0.00001
    lambda: 0.1
    whisper_adaptation: full   # full | lora
