seed: 1337
model_sample_rate: 16000
working_sample_rate: 16000
variants_per_clip: 2
output_dir: data/speech_enhancement

manifests:
  train: data/speech_enhancement/manifests/clean_train.jsonl
  valid: data/speech_enhancement/manifests/clean_valid.jsonl

noise_index: data/speech_enhancement/manifests/demand_noise_index.jsonl

noise:
  probability: 0.60
  second_scene_probability: 0.10
  snr_buckets:
    - [10, 15]
    - [5, 10]
    - [0, 5]
    - [-5, 0]

level:
  gain_db: [-6, 6]
  clipping:
    enabled: false
    probability: 0.10
    mode: hard
    threshold: [0.8, 0.98]
  agc:
    enabled: false

channel:
  narrowband:
    bandpass_hz: [300, 3400]
  wideband:
    bandpass_hz: [50, 7000]
    filter_target: true
  pass_through_path_distribution:
    - path: narrowband
      weight: 0.5
    - path: wideband
      weight: 0.5

codec_distribution:
  - codec: g711_alaw
    weight: 0.30
  - codec: g711_mulaw
    weight: 0.10
  - codec: gsm
    weight: 0.10
  - codec: amr_wb_12k65
    weight: 0.25
  - codec: amr_nb_12k2
    weight: 0.15
  - codec: opus_wb
    weight: 0.05
  - codec: opus_nb
    weight: 0.05
  - codec: pass_through
    weight: 0.10

profiles:
  - name: telephone_clean
    weight: 0.25
    description: Narrowband codec and channel simulation without additive noise.
    noise:
      probability: 0.0
    network_impairment:
      probability: 0.10
    codec_distribution:
      - codec: g711_alaw
        weight: 0.35
      - codec: g711_mulaw
        weight: 0.20
      - codec: gsm
        weight: 0.20
      - codec: amr_nb_12k2
        weight: 0.25

  - name: telephone_noisy
    weight: 0.30
    description: Narrowband telephone-style speech with environmental noise.
    noise:
      probability: 0.70
    network_impairment:
      probability: 0.20
    codec_distribution:
      - codec: g711_alaw
        weight: 0.35
      - codec: g711_mulaw
        weight: 0.15
      - codec: gsm
        weight: 0.20
      - codec: amr_nb_12k2
        weight: 0.30

  - name: voip_lossy
    weight: 0.25
    description: VoIP-style Opus wideband/narrowband codecs with packet-loss concealment.
    noise:
      probability: 0.30
    network_impairment:
      probability: 0.80
    codec_distribution:
      - codec: opus_wb
        weight: 0.70
        bitrate: [16k, 24k, 32k]
        frame_duration_ms: [20, 40, 60]
      - codec: opus_nb
        weight: 0.30
        bitrate: [12k, 16k]
        frame_duration_ms: [20, 40]

  - name: mobile_wideband
    weight: 0.20
    description: Mobile and app-call wideband speech with moderate acoustic contamination.
    noise:
      probability: 0.45
    network_impairment:
      probability: 0.30
    codec_distribution:
      - codec: amr_wb_12k65
        weight: 0.55
      - codec: opus_wb
        weight: 0.30
        bitrate: [16k, 24k, 32k]
        frame_duration_ms: [20, 40]
      - codec: pass_through
        weight: 0.15

network_impairment:
  enabled: true
  mode: packet_loss_plc
  probability: 0.60
  loss_rate_buckets:
    - [0.003, 0.02]
    - [0.02, 0.05]
    - [0.05, 0.10]
  burst_length: [1, 5]
  frame_ms: 20

normalization:
  mode: peak_safety
  peak: 0.99
