model:
  name: openai/whisper-small
  pretrained_model: null
  language: Persian
  task: transcribe
data:
  root_dir: data
  datasets:
  - cv-corpus-25.0
  - cv-corpus-25.0-degraded-v2
  - FarsSpon_train_dev
  - cv-corpus-25.0-long
  - FarsSpon_train_dev-long
  - cv-corpus-25.0-degraded-long-v2
  - fleurs-normalized
  sample_rate: 16000
run:
  output_dir: models/asr/whisper-small-deg-v2/runs
  name: whisper-small-fa
  resume: auto
training:
  seed: 1337
  num_train_epochs: 1
  learning_rate: 1.0e-05
  warmup_steps: 0
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  eval_steps: 5000
  save_steps: 1000
  logging_steps: 25
  save_total_limit: 3
  num_workers: 4
  device: auto
  mixed_precision: auto
  load_best_model_at_end: false
  generation_max_length: 225
