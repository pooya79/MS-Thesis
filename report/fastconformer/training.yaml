model:
  checkpoint: models/stt_fa_fastconformer_ctc.pt
data:
  root_dir: data
  datasets:
  - cv-corpus-25.0
  - FarsSpon_train_dev
  - cv-corpus-25.0-long
  - FarsSpon_train_dev-long
  - fleurs-normalized
  sample_rate: 16000
  min_duration_sec: 0.1
  max_duration_sec: 20.0
run:
  output_dir: models/asr/fastconformer/runs
  name: fastconformer-fa
  resume: auto
training:
  seed: 1337
  num_train_epochs: 1
  learning_rate: 5.0e-05
  warmup_steps: 500
  weight_decay: 0.0
  max_grad_norm: 1.0
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  eval_steps: 5000
  save_steps: 1000
  logging_steps: 25
  save_total_limit: 3
  num_workers: 8
  device: auto
  mixed_precision: auto
  freeze_encoder: false
