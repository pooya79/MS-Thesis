# Single config driving the 3-stage enhancement+fusion curriculum (D8/D10).
run_dir: models/asr/fusion/run_004

# Whisper-small backbone used to init Stages 1-2. Normally the fine-tuned Persian
# checkpoint (Phase 1) as a local run dir. A Hugging Face Hub id (e.g.
# openai/whisper-small) is also accepted as an explicit escape hatch to baseline
# on vanilla Whisper — note this trains fusion on an un-fine-tuned backbone and is
# not the intended methodology.
base_asr_checkpoint: models/asr/whisper-small-deg-v2/runs/whisper-small-fa/best
# Training datasets. Each entry is a path string (kind auto-detected) or a
# {path, kind} mapping with kind in {degraded, clean}.
#   - degraded: a ml.speech_data.generate_degraded_dataset directory
#     (degraded_to_clean.jsonl). Drives every stage. At least one is required.
#   - clean: a plain ASR dataset (train.tsv/dev.tsv + clips/, the project ASR
#     contract). Folded into the joint stage only, so its undegraded audio keeps
#     the full stack strong on clean speech.
datasets:
  - data/cv-corpus-25.0
  - data/cv-corpus-25.0-degraded-v2
  - data/FarsSpon_train_dev
  - data/cv-corpus-25.0-long
  - data/FarsSpon_train_dev-long
  - data/cv-corpus-25.0-degraded-long-v2
  - data/fleurs-normalized 
  # - data/cv-corpus-25.0                    # clean (joint-stage fine-tune only)

# Legacy single-dataset field; used as one degraded dataset only when `datasets`
# is null. Prefer `datasets` above.
dataset_dir: 
sample_rate: 16000                 # clean-dataset audio is resampled to this
train_split: train
valid_split: dev
clean_target: bandwidth_aligned   # bandwidth_aligned | full_band (D5)
model_name: openai/whisper-small
language: Persian                  # Whisper decoder prompt for dev-set generation
task: transcribe
generation_max_length: 225        # cap on generated tokens during dev WER eval

mixed_precision: false             # auto | true | false
device: auto                      # auto | cuda | cpu
seed: 1337
resume_from_stage: null           # null | 0 | 1 | 2 (or warmup | fusion | joint)

enhancer:
  type: residual_unet
  base_channels: 48
  depth: 3
  # Optional long-range temporal model at the U-Net bottleneck (identity-init, so
  # it never perturbs the Stage 0 identity start). none | transformer | gru.
  bottleneck: transformer
  bottleneck_layers: 2
  bottleneck_heads: 4
  bottleneck_dim: 256
  bottleneck_dropout: 0.0

# Encoder-feature-space fusion (D4). cross_attention lets the noisy and enhanced
# Whisper-encoder streams exchange context before a gated merge; `gated` is the
# lightweight element-wise baseline. Starts as a balanced blend either way.
fusion:
  type: cross_attention
  num_layers: 3
  num_heads: 12
  ffn_ratio: 4.0

stages:
  warmup:        # Stage 0 — enhancer E only, L_enh
    max_steps: 20000
    batch_size: 8
    segment_seconds: 4.0
    lr_enhancer: 0.0002
    lr_scheduler: cosine       # cosine decay to 0; "none"/"constant" keeps a flat LR
    warmup_steps: 500          # linear ramp 0 -> lr_enhancer, then cosine decay
    lambda: 0.5
    # ASR-aware warm-up: when > 0, add feature_match_weight * L1(encoder(enhanced),
    # encoder(clean)) so the enhancer is optimised to look clean to the Whisper
    # encoder, not just to minimise raw mel L1. lambda then weights L_enh. Needs
    # base_asr_checkpoint and forces full 30s windows (segment_seconds ignored).
    feature_match_weight: 0.5
    num_workers: 4
    log_every: 50
    eval_every: 4000            # dev L_enh; best checkpoint -> best.pt
    save_every: 1000           # rolling last.pt carries optimizer/scheduler/step for mid-stage resume
    eval_max_batches: null     # null = whole dev split
  fusion:        # Stage 1 — E + fusion, Whisper frozen
    max_steps: 30000
    batch_size: 8
    lr_frontend: 0.0002
    lr_scheduler: cosine
    warmup_steps: 1000
    lambda: 0.3
    eval_every: 5000           # dev WER/CER via generation; best -> best.pt
    save_every: 1000
    eval_max_batches: null       # cap dev batches so periodic WER stays cheap
    grad_clip: 1.0
    debug_steps:
      start: 5880
      end: 6990
  joint:         # Stage 2 — E + fusion + Whisper, end-to-end
    max_steps: 120000
    batch_size: 4
    lr_frontend: 0.0001
    lr_whisper: 0.000005        # cosine scales both groups by the same factor, preserving this ratio
    lr_scheduler: cosine
    warmup_steps: 2000
    lambda: 0.1
    eval_every: 5000
    save_every: 1000
    eval_max_batches: null
    grad_clip: 1.0
    debug_steps:
      start: 5880
      end: 6020
